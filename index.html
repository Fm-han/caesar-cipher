<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凯撒密码加密解密</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input[type="number"] { width: 100px; text-align: center; }
        textarea { width: 100%; min-height: 120px; font-family: monospace; font-size: 16px; resize: vertical; }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-green { background: #28a745; color: #fff; }
        .btn-gray { background: #6c757d; color: #fff; }
        .output { background: #f5f5f5; padding: 16px; border-radius: 4px; font-family: monospace; font-size: 16px; min-height: 80px; word-break: break-all; }
        .shift-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .slider-value { font-size: 1.5rem; font-weight: 600; color: #007bff; min-width: 40px; text-align: center; }
        input[type="range"] { flex: 1; }
        .brute-force { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 16px; }
        .bf-item { background: #f5f5f5; padding: 8px 12px; border-radius: 4px; font-size: 13px; }
        .bf-shift { font-weight: 600; color: #007bff; }
        .bf-text { font-family: monospace; word-break: break-all; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>凯撒密码加密/解密</h1>
        <div class="card">
            <div class="shift-controls">
                <label>偏移量:</label>
                <input type="range" id="shiftSlider" min="1" max="25" value="3" oninput="updateShift()">
                <span class="slider-value" id="shiftValue">3</span>
                <input type="number" id="shiftInput" value="3" min="1" max="25" style="width:60px;" onchange="updateFromInput()">
            </div>
            <div class="form-group">
                <label>输入文字</label>
                <textarea id="input" placeholder="输入要加密或解密的文字...">Hello World</textarea>
            </div>
            <button class="btn btn-blue" onclick="encrypt()">加密</button>
            <button class="btn btn-green" onclick="decrypt()">解密</button>
            <button class="btn btn-gray" onclick="bruteForce()">暴力破解</button>
            <button class="btn btn-gray" onclick="clearAll()">清空</button>
        </div>
        <div class="card">
            <label>结果</label>
            <div class="output" id="output"></div>
            <button class="btn btn-blue" onclick="copyOutput()" style="margin-top:12px;">复制结果</button>
        </div>
        <div class="card" id="bfCard" style="display:none;">
            <label>暴力破解结果 (所有可能的偏移)</label>
            <div class="brute-force" id="bruteForceResult"></div>
        </div>
    </div>
    <script>
        function caesar(text, shift, decrypt = false) {
            if (decrypt) shift = -shift;
            shift = ((shift % 26) + 26) % 26;
            
            return text.split('').map(char => {
                const code = char.charCodeAt(0);
                if (code >= 65 && code <= 90) {
                    return String.fromCharCode(((code - 65 + shift) % 26) + 65);
                } else if (code >= 97 && code <= 122) {
                    return String.fromCharCode(((code - 97 + shift) % 26) + 97);
                }
                return char;
            }).join('');
        }
        
        function getShift() {
            return parseInt(document.getElementById('shiftInput').value) || 3;
        }
        
        function updateShift() {
            const val = document.getElementById('shiftSlider').value;
            document.getElementById('shiftValue').textContent = val;
            document.getElementById('shiftInput').value = val;
        }
        
        function updateFromInput() {
            const val = document.getElementById('shiftInput').value;
            document.getElementById('shiftSlider').value = val;
            document.getElementById('shiftValue').textContent = val;
        }
        
        function encrypt() {
            const text = document.getElementById('input').value;
            const shift = getShift();
            document.getElementById('output').textContent = caesar(text, shift);
        }
        
        function decrypt() {
            const text = document.getElementById('input').value;
            const shift = getShift();
            document.getElementById('output').textContent = caesar(text, shift, true);
        }
        
        function bruteForce() {
            const text = document.getElementById('input').value;
            const result = document.getElementById('bruteForceResult');
            let html = '';
            
            for (let i = 1; i <= 25; i++) {
                html += `<div class="bf-item"><span class="bf-shift">偏移 ${i}:</span><div class="bf-text">${caesar(text, i)}</div></div>`;
            }
            
            result.innerHTML = html;
            document.getElementById('bfCard').style.display = 'block';
        }
        
        function copyOutput() {
            const text = document.getElementById('output').textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制结果', 1500);
            });
        }
        
        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = '';
            document.getElementById('bfCard').style.display = 'none';
        }
    </script>
</body>
</html>
